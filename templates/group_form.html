{% extends "base.html" %}

{% block title %}{% if group %}Edit Group{% else %}New Contact Group{% endif %} - WhatsApp Campaign Manager{% endblock %}

{% block content %}
<div class="max-w-3xl mx-auto">
    <div class="bg-white shadow rounded-lg">
        <div class="px-4 py-5 sm:p-6">
            <h1 class="text-2xl font-bold text-gray-900 mb-6">
                {% if group %}Edit Contact Group{% else %}Create New Contact Group{% endif %}
            </h1>
            
            <form action="{{ url_for('main.edit_group', id=group.id) if group else url_for('main.create_group') }}" method="POST">
                <div class="space-y-6">
                    <!-- Group Name -->
                    <div>
                        <label for="name" class="block text-sm font-medium text-gray-700">
                            Group Name
                        </label>
                        <div class="mt-1">
                            <input type="text" name="name" id="name" required
                                   value="{{ group.name if group else '' }}"
                                   class="shadow-sm focus:ring-indigo-500 focus:border-indigo-500 block w-full sm:text-sm border-gray-300 rounded-md"
                                   placeholder="Enter group name">
                        </div>
                    </div>

                    <!-- Description -->
                    <div>
                        <label for="description" class="block text-sm font-medium text-gray-700">
                            Description (Optional)
                        </label>
                        <div class="mt-1">
                            <textarea id="description" name="description" rows="3"
                                    class="shadow-sm focus:ring-indigo-500 focus:border-indigo-500 block w-full sm:text-sm border-gray-300 rounded-md"
                                    placeholder="Enter group description">{{ group.description if group else '' }}</textarea>
                        </div>
                    </div>

                    <!-- Submit Button -->
                    <div class="pt-5">
                        <div class="flex justify-end">
                            <a href="{{ url_for('main.contacts') }}"
                               class="bg-white py-2 px-4 border border-gray-300 rounded-md shadow-sm text-sm font-medium text-gray-700 hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
                                Cancel
                            </a>
                            <button type="submit"
                                    class="ml-3 inline-flex justify-center py-2 px-4 border border-transparent shadow-sm text-sm font-medium rounded-md text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
                                {{ 'Save Changes' if group else 'Create Group' }}
                            </button>
                        </div>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
